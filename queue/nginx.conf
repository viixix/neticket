worker_processes auto;

events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile       on;
    tcp_nopush     on;
    tcp_nodelay    on;
    keepalive_timeout 65;

    upstream queue {
        server queue:3003;
        keepalive 512;
    }

    map $http_origin $cors_allow_origin {
        default                     "";
        "https://neticket.site"     $http_origin;
        "https://www.neticket.site" $http_origin;
    }

    # HTTP → HTTPS 리다이렉트
    server {
        listen 80 backlog=8192;
        server_name queue.neticket.site;
        return 301 https://$host$request_uri;
    }

    # queue.neticket.site → queue:3003
    server {
        listen 443 backlog=8192;
        server_name queue.neticket.site;

        ssl_certificate     /etc/letsencrypt/live/queue.neticket.site/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/queue.neticket.site/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      $cors_allow_origin;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH';
                add_header 'Access-Control-Allow-Headers'     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Trace-Id,X-Captcha-Id';
                add_header 'Access-Control-Allow-Credentials' 'true';
                add_header 'Access-Control-Max-Age'           1728000;
                add_header 'Content-Type'                     'text/plain; charset=utf-8';
                add_header 'Content-Length'                   0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'      $cors_allow_origin always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers'     'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Trace-Id,X-Captcha-Id' always;
            add_header 'Access-Control-Expose-Headers'    'Content-Length,Content-Range,X-Captcha-Id' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;

            proxy_pass         http://queue;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Trace-Id        $request_id;
            add_header         X-Trace-Id        $request_id always;

            # SSE 필수 설정
            proxy_buffering    off;
            proxy_cache        off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            keepalive_timeout  86400s;
            proxy_set_header   Connection        '';
            chunked_transfer_encoding on;
        }
    }
}
