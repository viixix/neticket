services:
  redis:
    image: redis:7.2-alpine
    container_name: redis-queue
    ports:
      - "6379:6379"
    networks:
      - queue-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    # volumes:
    #   - ./redis_data:/data

  queue:
    image: ${GCP_REGISTRY}/queue:${IMAGE_TAG:-latest}
    expose:
      - "3003"
    environment:
      - NODE_ENV=production
      - REDIS_QUEUE_HOST=${REDIS_QUEUE_HOST:-redis}
      - REDIS_QUEUE_PORT=${REDIS_QUEUE_PORT:-6379}
      - REDIS_CORE_HOST=${REDIS_CORE_HOST}
      - REDIS_CORE_PORT=${REDIS_CORE_PORT:-6380}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID:-neticket-492104}
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - queue-network
    logging:
      driver: gcplogs
      options:
        gcp-project: ${GCP_PROJECT_ID:-neticket-492104}
        labels: "service=queue,env=production"
    ulimits:
      nofile:
        soft: 65535
        hard: 65535

  nginx:
    image: nginx:alpine
    container_name: nginx-queue
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - queue
    networks:
      - queue-network
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    logging:
      driver: gcplogs
      options:
        gcp-project: ${GCP_PROJECT_ID:-neticket-492104}
        labels: "service=nginx-queue,env=production"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.2
    container_name: cadvisor-queue
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    networks:
      - queue-network

networks:
  queue-network:
    driver: bridge
