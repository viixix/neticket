name: CD - Manual Deploy

on:
  workflow_dispatch:
    inputs:
      services:
        description: "배포 대상 선택"
        required: true
        default: "backend"
        type: choice
        options:
          - backend
          - show
          - booking
          - queue
          - all
      branch:
        description: "배포할 브랜치 (예: dev)"
        required: true
        default: "dev"

jobs:
  resolve-targets:
    name: 배포 대상 결정
    runs-on: ubuntu-latest
    outputs:
      has_targets: ${{ steps.targets.outputs.has_targets }}
      changed_services: ${{ steps.targets.outputs.changed_services }}
      show: ${{ steps.targets.outputs.show }}
      booking: ${{ steps.targets.outputs.booking }}
      queue: ${{ steps.targets.outputs.queue }}
    steps:
      - name: 서비스 입력 파싱
        id: targets
        shell: bash
        run: |
          SERVICES_RAW="${{ github.event.inputs.services }}"
          SERVICES=$(echo "$SERVICES_RAW" | tr '[:upper:]' '[:lower:]' | tr -d ' ')

          API=false
          TICKET=false
          QUEUE=false

          case "$SERVICES" in
            all)
              API=true
              TICKET=true
              QUEUE=true
              ;;
            backend)
              API=true; TICKET=true
              ;;
            show)
              API=true
              ;;
            booking)
              TICKET=true
              ;;
            queue)
              QUEUE=true
              ;;
          esac

          HAS=false
          if [ "$API" = "true" ] || [ "$TICKET" = "true" ] || [ "$QUEUE" = "true" ]; then
            HAS=true
          fi

          CHANGED=""
          if [ "$API" = "true" ]; then CHANGED="${CHANGED} show"; fi
          if [ "$TICKET" = "true" ]; then CHANGED="${CHANGED} booking"; fi
          if [ "$QUEUE" = "true" ]; then CHANGED="${CHANGED} queue"; fi

          echo "has_targets=$HAS" >> "$GITHUB_OUTPUT"
          echo "changed_services=${CHANGED# }" >> "$GITHUB_OUTPUT"
          echo "show=$API" >> "$GITHUB_OUTPUT"
          echo "booking=$TICKET" >> "$GITHUB_OUTPUT"
          echo "queue=$QUEUE" >> "$GITHUB_OUTPUT"

          if [ "$HAS" != "true" ]; then
            echo "유효한 서비스가 선택되지 않았습니다: $SERVICES_RAW"
            exit 1
          fi

  build-and-push:
    name: 이미지 빌드 및 푸시
    needs: resolve-targets
    if: needs.resolve-targets.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: 이미지 태그 설정
        id: meta
        shell: bash
        run: |
          IMAGE_TAG=$(git rev-parse HEAD)
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: GCP Artifact Registry 로그인
        env:
          GCP_REGISTRY: ${{ secrets.GCP_REGISTRY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
        run: |
          echo "$GCP_SA_KEY" | docker login "$GCP_REGISTRY" -u "_json_key" --password-stdin

      - name: 선택된 이미지 빌드 및 푸시
        env:
          GCP_REGISTRY: ${{ secrets.GCP_REGISTRY }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          API_SERVER: ${{ needs.resolve-targets.outputs.show }}
          TICKET_SERVER: ${{ needs.resolve-targets.outputs.booking }}
          QUEUE_BACKEND: ${{ needs.resolve-targets.outputs.queue }}
        run: |
          if [ "$API_SERVER" = "true" ]; then
            docker build -f backend/show/Dockerfile -t "$GCP_REGISTRY/neticket-show:$IMAGE_TAG" .
            docker push "$GCP_REGISTRY/neticket-show:$IMAGE_TAG"
          fi

          if [ "$TICKET_SERVER" = "true" ]; then
            docker build -f backend/booking/Dockerfile -t "$GCP_REGISTRY/neticket-booking:$IMAGE_TAG" .
            docker push "$GCP_REGISTRY/neticket-booking:$IMAGE_TAG"
          fi

          if [ "$QUEUE_BACKEND" = "true" ]; then
            docker build -f queue/Dockerfile -t "$GCP_REGISTRY/neticket-queue:$IMAGE_TAG" .
            docker push "$GCP_REGISTRY/neticket-queue:$IMAGE_TAG"
          fi

  deploy-backend:
    name: Deploy - Backend Servers
    needs: [resolve-targets, build-and-push]
    if: needs.resolve-targets.outputs.show == 'true' || needs.resolve-targets.outputs.booking == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to backend server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.BACKEND_SERVER_HOST }}
          username: ${{ secrets.BACKEND_SERVER_USER }}
          password: ${{ secrets.BACKEND_SERVER_PASSWORD }}
          envs: GCP_REGISTRY,GCP_SA_KEY,SHOW_CHANGED,BOOKING_CHANGED,TARGET_BRANCH,IMAGE_TAG,LOKI_URL
          script: |
            cd /app/neticket

            # 최신 코드 가져오기
            git fetch origin $TARGET_BRANCH
            git reset --hard origin/$TARGET_BRANCH

            cd backend

            # 환경 변수 설정 (LOKI_URL 주입)
            if [ ! -f .env ]; then touch .env; fi
            sed -i '/^LOKI_URL=/d' .env
            echo "LOKI_URL=$LOKI_URL" >> .env

            # 변경된 서비스만 재배포
            if [ "$SHOW_CHANGED" == "true" ]; then
              echo "🚀 Deploying show..."
              echo "$GCP_SA_KEY" | docker login "$GCP_REGISTRY" -u "_json_key" --password-stdin
              printf "services:\n  show:\n    image: %s\n" "$GCP_REGISTRY/neticket-show:$IMAGE_TAG" > /tmp/backend.override.yml
              docker compose -f docker-compose.yml -f /tmp/backend.override.yml pull show promtail cadvisor
              docker compose -f docker-compose.yml -f /tmp/backend.override.yml up -d --no-build show promtail cadvisor
              echo "✅ show deployed successfully"
            fi

            if [ "$BOOKING_CHANGED" == "true" ]; then
              echo "🚀 Deploying booking..."
              echo "$GCP_SA_KEY" | docker login "$GCP_REGISTRY" -u "_json_key" --password-stdin
              printf "services:\n  booking:\n    image: %s\n" "$GCP_REGISTRY/neticket-booking:$IMAGE_TAG" > /tmp/backend.override.yml
              docker compose -f docker-compose.yml -f /tmp/backend.override.yml pull booking promtail cadvisor
              docker compose -f docker-compose.yml -f /tmp/backend.override.yml up -d --no-build booking promtail cadvisor
              echo "✅ booking deployed successfully"
            fi

            # 이전 이미지 정리
            docker image prune -f
        env:
          GCP_REGISTRY: ${{ secrets.GCP_REGISTRY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          SHOW_CHANGED: ${{ needs.resolve-targets.outputs.show }}
          BOOKING_CHANGED: ${{ needs.resolve-targets.outputs.booking }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          LOKI_URL: ${{ secrets.LOKI_URL }}

  deploy-queue:
    name: Deploy - Queue Backend
    needs: [resolve-targets, build-and-push]
    if: needs.resolve-targets.outputs.queue == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to queue server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.QUEUE_SERVER_HOST }}
          username: ${{ secrets.QUEUE_SERVER_USER }}
          password: ${{ secrets.QUEUE_SERVER_PASSWORD }}
          envs: GCP_REGISTRY,GCP_SA_KEY,TARGET_BRANCH,IMAGE_TAG,LOKI_URL
          script: |
            cd /app/neticket

            # 최신 코드 가져오기
            git fetch origin $TARGET_BRANCH
            git reset --hard origin/$TARGET_BRANCH

            # queue 서비스 재배포
            cd queue

            # 환경 변수 설정 (LOKI_URL 주입)
            if [ ! -f .env ]; then touch .env; fi
            sed -i '/^LOKI_URL=/d' .env
            echo "LOKI_URL=$LOKI_URL" >> .env

            echo "$GCP_SA_KEY" | docker login "$GCP_REGISTRY" -u "_json_key" --password-stdin
            printf "services:\n  queue:\n    image: %s\n" "$GCP_REGISTRY/neticket-queue:$IMAGE_TAG" > /tmp/queue.override.yml
            docker compose -f docker-compose.yml -f /tmp/queue.override.yml pull queue promtail cadvisor
            docker compose -f docker-compose.yml -f /tmp/queue.override.yml up -d --no-build queue promtail cadvisor
            
            # 이전 이미지 정리
            docker image prune -f

            echo "✅ Queue Backend deployed successfully"
        env:
          GCP_REGISTRY: ${{ secrets.GCP_REGISTRY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          LOKI_URL: ${{ secrets.LOKI_URL }}

  deployment-summary:
    name: Deployment Summary
    needs:
      [resolve-targets, build-and-push, deploy-backend, deploy-queue]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check Deployment Results
        run: |
          echo "=== 배포 요약 ==="
          echo "대상: ${{ needs.resolve-targets.outputs.changed_services }}"
          echo ""
          echo "Deployment Results:"
          echo "- Backend (API + Ticket): ${{ needs.deploy-backend.result }}"
          echo "- Queue Backend: ${{ needs.deploy-queue.result }}"

          if [ "${{ contains(needs.*.result, 'failure') }}" == "true" ]; then
            echo ""
            echo "❌ 일부 배포가 실패했습니다"
            exit 1
          fi

          echo ""
          echo "✅ 수동 배포가 완료되었습니다"
