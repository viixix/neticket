name: CD - Manual Deploy

on:
  workflow_dispatch:
    inputs:
      services:
        description: "배포 대상 선택"
        required: true
        default: "queue"
        type: choice
        options:
          - queue
          - booking
          - show
          - core
          - all
      branch:
        description: "배포할 브랜치"
        required: true
        default: "dev"

jobs:
  # 1단계: 배포 대상 결정 (JSON 매트릭스 생성)
  resolve-targets:
    name: 배포 대상 결정
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_targets: ${{ steps.set-matrix.outputs.has_targets }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          SERVICES="${{ github.event.inputs.services }}"
          if [ "$SERVICES" = "all" ]; then
            JSON='["show", "booking", "queue"]'
          elif [ "$SERVICES" = "core" ]; then
            JSON='["show", "booking"]'
          else
            JSON="[\"$SERVICES\"]"
          fi
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "has_targets=true" >> "$GITHUB_OUTPUT"

  # 2단계: 이미지 빌드 및 푸시 (GHA 캐시 활용)
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    needs: resolve-targets
    if: needs.resolve-targets.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Docker Buildx 설치
        uses: docker/setup-buildx-action@v3

      - name: GCP Artifact Registry 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGISTRY_HOST }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}

      - name: ${{ matrix.service }} 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service == 'queue' && 'queue/Dockerfile' || format('core/{0}/Dockerfile', matrix.service) }}
          push: true
          tags: ${{ vars.GCP_REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3a: core 호스트(show + booking) — 동일 호스트·동일 compose이므로 직렬
  deploy-core:
    name: Deploy (core) - ${{ matrix.service }}
    needs: [resolve-targets, build-and-push]
    if: needs.resolve-targets.outputs.has_targets == 'true' && (contains(needs.resolve-targets.outputs.matrix, 'show') || contains(needs.resolve-targets.outputs.matrix, 'booking'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - service: show
            host_var: GCP_CORE_SERVER_HOST
            user_var: GCP_CORE_SERVER_USER
          - service: booking
            host_var: GCP_CORE_SERVER_HOST
            user_var: GCP_CORE_SERVER_USER
    steps:
      - name: 배포 실행
        if: contains(fromJson(needs.resolve-targets.outputs.matrix), matrix.service)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars[matrix.host_var] }}
          username: ${{ vars[matrix.user_var] }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: GCP_REGISTRY,GCP_SA_KEY,IMAGE_TAG,SERVICE_NAME,TARGET_BRANCH,REDIS_QUEUE_HOST,KOPIS_SERVICE_KEY,DB_PASSWORD,DB_USERNAME
          script: |
            git config --global --add safe.directory /app/neticket
            cd /app/neticket

            # 1. 최신 코드 동기화
            git fetch origin $TARGET_BRANCH
            git reset --hard origin/$TARGET_BRANCH

            # 2. 서비스 위치로 이동
            [ "$SERVICE_NAME" == "queue" ] && cd queue || cd core

            # 3. 환경 변수 주입 (cross-VM 연결 및 시크릿)
            if [ ! -f .env ]; then touch .env; fi
            for KEY in REDIS_QUEUE_HOST KOPIS_SERVICE_KEY DB_PASSWORD DB_USERNAME; do
              sed -i "/^${KEY}=/d" .env
              eval "echo \"${KEY}=\$${KEY}\"" >> .env
            done

            # 4. GCP Artifact Registry 로그인
            echo "$GCP_SA_KEY" | docker login -u _json_key --password-stdin "https://$(echo $GCP_REGISTRY | cut -d/ -f1)"

            # 5. 배포
            export IMAGE_TAG GCP_REGISTRY SERVICE_NAME

            echo "🚀 $SERVICE_NAME 배포 중 (Healthcheck 대기)..."
            docker compose pull $SERVICE_NAME cadvisor
            docker compose up -d --wait --no-build $SERVICE_NAME cadvisor
            docker compose up -d --force-recreate --no-build nginx

            # 6. 디스크 청소 (24시간 이내 이미지는 보존하여 롤백 대비)
            docker image prune -af --filter "until=24h"
            echo "✅ $SERVICE_NAME 배포 완료"
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE_NAME: ${{ matrix.service }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          GCP_REGISTRY: ${{ vars.GCP_REGISTRY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          REDIS_QUEUE_HOST: ${{ vars.REDIS_QUEUE_HOST }}
          KOPIS_SERVICE_KEY: ${{ secrets.KOPIS_SERVICE_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}

  # 3b: 큐 호스트 — deploy-core와 서로 needs 없음 → all 선택 시 병렬 실행
  deploy-queue:
    name: Deploy (queue) - queue
    needs: [resolve-targets, build-and-push]
    if: needs.resolve-targets.outputs.has_targets == 'true' && contains(needs.resolve-targets.outputs.matrix, 'queue')
    runs-on: ubuntu-latest
    steps:
      - name: 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.GCP_QUEUE_SERVER_HOST }}
          username: ${{ vars.GCP_QUEUE_SERVER_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: GCP_REGISTRY,GCP_SA_KEY,IMAGE_TAG,SERVICE_NAME,TARGET_BRANCH,REDIS_CORE_HOST
          script: |
            git config --global --add safe.directory /app/neticket
            cd /app/neticket

            # 1. 최신 코드 동기화
            git fetch origin $TARGET_BRANCH
            git reset --hard origin/$TARGET_BRANCH

            # 2. 서비스 위치로 이동
            cd queue

            # 3. 환경 변수 주입 (cross-VM 연결)
            if [ ! -f .env ]; then touch .env; fi
            sed -i '/^REDIS_CORE_HOST=/d' .env
            echo "REDIS_CORE_HOST=$REDIS_CORE_HOST" >> .env

            # 4. GCP Artifact Registry 로그인
            echo "$GCP_SA_KEY" | docker login -u _json_key --password-stdin "https://$(echo $GCP_REGISTRY | cut -d/ -f1)"

            # 5. 배포
            export IMAGE_TAG GCP_REGISTRY SERVICE_NAME

            echo "🚀 $SERVICE_NAME 배포 중 (Healthcheck 대기)..."
            docker compose pull $SERVICE_NAME cadvisor
            docker compose up -d --wait --no-build $SERVICE_NAME cadvisor
            docker compose up -d --force-recreate --no-build nginx

            # 6. 디스크 청소 (24시간 이내 이미지는 보존하여 롤백 대비)
            docker image prune -af --filter "until=24h"
            echo "✅ $SERVICE_NAME 배포 완료"
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE_NAME: queue
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          GCP_REGISTRY: ${{ vars.GCP_REGISTRY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          REDIS_CORE_HOST: ${{ vars.REDIS_CORE_HOST }}

  # 4단계: 결과 요약
  deployment-summary:
    name: Deployment Summary
    needs: [resolve-targets, deploy-core, deploy-queue]
    if: always() && needs.resolve-targets.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 결과 출력
        run: |
          echo "=== 배포 요약 ==="
          echo "대상: ${{ needs.resolve-targets.outputs.matrix }}"
          echo "결과: 모든 작업이 완료되었습니다."
