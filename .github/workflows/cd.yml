name: CD - Manual Deploy

on:
  workflow_dispatch:
    inputs:
      services:
        description: "배포 대상 선택"
        required: true
        default: "queue"
        type: choice
        options:
          - queue
          - booking
          - show
          - core
          - all
      branch:
        description: "배포할 브랜치"
        required: true
        default: "dev"

jobs:
  # 1단계: 배포 대상 결정
  resolve-targets:
    name: 배포 대상 결정
    runs-on: ubuntu-latest
    outputs:
      deploy_show: ${{ steps.set.outputs.deploy_show }}
      deploy_booking: ${{ steps.set.outputs.deploy_booking }}
      deploy_queue: ${{ steps.set.outputs.deploy_queue }}
    steps:
      - id: set
        run: |
          S="${{ github.event.inputs.services }}"
          [[ "$S" == "show"    || "$S" == "core" || "$S" == "all" ]] && SHOW=true    || SHOW=false
          [[ "$S" == "booking" || "$S" == "core" || "$S" == "all" ]] && BOOKING=true || BOOKING=false
          [[ "$S" == "queue"   || "$S" == "all"                   ]] && QUEUE=true   || QUEUE=false
          echo "deploy_show=$SHOW"       >> $GITHUB_OUTPUT
          echo "deploy_booking=$BOOKING" >> $GITHUB_OUTPUT
          echo "deploy_queue=$QUEUE"     >> $GITHUB_OUTPUT

  # 2단계: 빌드 & 푸시 — 서비스별 독립 실행 (병렬)
  build-show:
    name: Build & Push - show
    needs: resolve-targets
    if: needs.resolve-targets.outputs.deploy_show == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGISTRY_HOST }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: core/show/Dockerfile
          push: true
          tags: ${{ vars.GCP_REGISTRY }}/show:${{ github.sha }}
          cache-from: type=gha,scope=show
          cache-to: type=gha,mode=max,scope=show

  build-booking:
    name: Build & Push - booking
    needs: resolve-targets
    if: needs.resolve-targets.outputs.deploy_booking == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGISTRY_HOST }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: core/booking/Dockerfile
          push: true
          tags: ${{ vars.GCP_REGISTRY }}/booking:${{ github.sha }}
          cache-from: type=gha,scope=booking
          cache-to: type=gha,mode=max,scope=booking

  build-queue:
    name: Build & Push - queue
    needs: resolve-targets
    if: needs.resolve-targets.outputs.deploy_queue == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGISTRY_HOST }}
          username: _json_key
          password: ${{ secrets.GCP_SA_KEY }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: queue/Dockerfile
          push: true
          tags: ${{ vars.GCP_REGISTRY }}/queue:${{ github.sha }}
          cache-from: type=gha,scope=queue
          cache-to: type=gha,mode=max,scope=queue

  # 3단계: 배포 — show/booking 병렬, queue 독립
  deploy-show:
    name: Deploy - show
    needs: [build-show]
    runs-on: ubuntu-latest
    steps:
      - name: 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.GCP_CORE_SERVER_HOST }}
          username: ${{ vars.GCP_CORE_SERVER_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: GCP_REGISTRY,GCP_SA_KEY,IMAGE_TAG,TARGET_BRANCH,REDIS_QUEUE_HOST,KOPIS_SERVICE_KEY,DB_PASSWORD,DB_USERNAME
          script: |
            set -e
            git config --global --add safe.directory /app/neticket

            # git 동기화 + .env 주입 (show/booking 병렬 실행 시 경쟁 방지)
            (
              flock -x 200
              cd /app/neticket
              git fetch origin $TARGET_BRANCH
              git reset --hard origin/$TARGET_BRANCH
              cd core
              if [ ! -f .env ]; then touch .env; fi
              for KEY in REDIS_QUEUE_HOST KOPIS_SERVICE_KEY DB_PASSWORD DB_USERNAME; do
                sed -i "/^${KEY}=/d" .env
                eval "echo \"${KEY}=\$${KEY}\"" >> .env
              done
            ) 200>/tmp/neticket-core.lock

            echo "$GCP_SA_KEY" | docker login -u _json_key --password-stdin "https://$(echo $GCP_REGISTRY | cut -d/ -f1)"
            export IMAGE_TAG GCP_REGISTRY

            echo "🚀 show 배포 중 (Healthcheck 대기)..."
            cd /app/neticket/core
            docker compose pull show
            docker compose up -d --wait --no-build --no-deps show
            echo "✅ show 배포 완료"
        env:
          IMAGE_TAG: ${{ github.sha }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          GCP_REGISTRY: ${{ vars.GCP_REGISTRY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          REDIS_QUEUE_HOST: ${{ vars.REDIS_QUEUE_HOST }}
          KOPIS_SERVICE_KEY: ${{ secrets.KOPIS_SERVICE_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}

  deploy-booking:
    name: Deploy - booking
    needs: [build-booking]
    runs-on: ubuntu-latest
    steps:
      - name: 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.GCP_CORE_SERVER_HOST }}
          username: ${{ vars.GCP_CORE_SERVER_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: GCP_REGISTRY,GCP_SA_KEY,IMAGE_TAG,TARGET_BRANCH,REDIS_QUEUE_HOST,KOPIS_SERVICE_KEY,DB_PASSWORD,DB_USERNAME
          script: |
            set -e
            git config --global --add safe.directory /app/neticket

            # git 동기화 + .env 주입 (show/booking 병렬 실행 시 경쟁 방지)
            (
              flock -x 200
              cd /app/neticket
              git fetch origin $TARGET_BRANCH
              git reset --hard origin/$TARGET_BRANCH
              cd core
              if [ ! -f .env ]; then touch .env; fi
              for KEY in REDIS_QUEUE_HOST KOPIS_SERVICE_KEY DB_PASSWORD DB_USERNAME; do
                sed -i "/^${KEY}=/d" .env
                eval "echo \"${KEY}=\$${KEY}\"" >> .env
              done
            ) 200>/tmp/neticket-core.lock

            echo "$GCP_SA_KEY" | docker login -u _json_key --password-stdin "https://$(echo $GCP_REGISTRY | cut -d/ -f1)"
            export IMAGE_TAG GCP_REGISTRY

            echo "🚀 booking 배포 중 (Healthcheck 대기)..."
            cd /app/neticket/core
            docker compose pull booking
            docker compose up -d --wait --no-build --no-deps booking
            echo "✅ booking 배포 완료"
        env:
          IMAGE_TAG: ${{ github.sha }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          GCP_REGISTRY: ${{ vars.GCP_REGISTRY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          REDIS_QUEUE_HOST: ${{ vars.REDIS_QUEUE_HOST }}
          KOPIS_SERVICE_KEY: ${{ secrets.KOPIS_SERVICE_KEY }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}

  # show/booking 둘 다 완료 후 nginx 한 번만 재시작
  restart-nginx-core:
    name: Restart nginx (core)
    needs: [deploy-show, deploy-booking]
    if: always() && (needs.deploy-show.result == 'success' || needs.deploy-booking.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: nginx 재시작
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.GCP_CORE_SERVER_HOST }}
          username: ${{ vars.GCP_CORE_SERVER_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /app/neticket/core
            docker compose up -d --force-recreate --no-build --no-deps nginx
            docker image prune -af --filter "until=24h"
            echo "✅ nginx 재시작 완료"

  # queue는 완전 독립 — build 끝나자마자 배포
  deploy-queue:
    name: Deploy - queue
    needs: [build-queue]
    runs-on: ubuntu-latest
    steps:
      - name: 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ vars.GCP_QUEUE_SERVER_HOST }}
          username: ${{ vars.GCP_QUEUE_SERVER_USER }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          envs: GCP_REGISTRY,GCP_SA_KEY,IMAGE_TAG,TARGET_BRANCH,REDIS_CORE_HOST
          script: |
            set -e
            git config --global --add safe.directory /app/neticket
            cd /app/neticket

            git fetch origin $TARGET_BRANCH
            git reset --hard origin/$TARGET_BRANCH

            cd queue
            if [ ! -f .env ]; then touch .env; fi
            sed -i '/^REDIS_CORE_HOST=/d' .env
            echo "REDIS_CORE_HOST=$REDIS_CORE_HOST" >> .env

            echo "$GCP_SA_KEY" | docker login -u _json_key --password-stdin "https://$(echo $GCP_REGISTRY | cut -d/ -f1)"
            export IMAGE_TAG GCP_REGISTRY

            echo "🚀 queue 배포 중 (Healthcheck 대기)..."
            docker compose pull queue
            docker compose up -d --wait --no-build --no-deps queue
            docker compose up -d --force-recreate --no-build nginx
            docker image prune -af --filter "until=24h"
            echo "✅ queue 배포 완료"
        env:
          IMAGE_TAG: ${{ github.sha }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          GCP_REGISTRY: ${{ vars.GCP_REGISTRY }}
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          REDIS_CORE_HOST: ${{ vars.REDIS_CORE_HOST }}

  # 4단계: 결과 요약
  deployment-summary:
    name: Deployment Summary
    needs: [resolve-targets, deploy-show, deploy-booking, restart-nginx-core, deploy-queue]
    if: always() && needs.resolve-targets.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 결과 출력
        run: |
          echo "=== 배포 요약 ==="
          echo "show:    ${{ needs.deploy-show.result }}"
          echo "booking: ${{ needs.deploy-booking.result }}"
          echo "nginx:   ${{ needs.restart-nginx-core.result }}"
          echo "queue:   ${{ needs.deploy-queue.result }}"
