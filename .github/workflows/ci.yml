name: CI - Pull Request

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

jobs:
  detect-changes:
    name: 🔍 Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      backend_matrix: ${{ steps.filter.outputs.matrix }}
      frontend_changed: ${{ steps.detect.outputs.frontend_changed }}
      changed_services: ${{ steps.detect.outputs.changed_services }}
    steps:
      - name: ⬇️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🕵️ Run Change Detection Script
        id: detect
        run: |
          chmod +x .github/scripts/detect-changes.sh
          BASE="${{ github.base_ref || github.ref_name }}"
          .github/scripts/detect-changes.sh "origin/$BASE"

      - name: 🧪 Filter Backend Matrix
        id: filter
        run: |
          # 감지된 전체 서비스 목록 가져오기
          SERVICES='${{ steps.detect.outputs.changed_services }}'

          # 백엔드만 솎아내기 (sed)
          BACKEND=$(echo $SERVICES | sed 's/"frontend",//g; s/,"frontend"//g; s/\["frontend"\]/[]/g')

          echo "matrix=$BACKEND" >> $GITHUB_OUTPUT

      - name: 📢 Detection Result Summary
        run: |
          echo "### 🔍 Detection Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Has Changes:** ${{ steps.detect.outputs.has_changes }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend Changed:** ${{ steps.detect.outputs.frontend_changed }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend Matrix:** \`${{ steps.filter.outputs.matrix }}\`" >> $GITHUB_STEP_SUMMARY

  # Frontend CI
  ci-frontend:
    name: 🎨 CI - Frontend
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: 10.28.1 }

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Shared Packages
        run: pnpm --filter "./packages/*" build

      - name: 🧹 Run Lint
        run: pnpm --filter frontend lint

      - name: 🏗️ Build Application (Next.js)
        run: pnpm --filter frontend build
        # Next.js 빌드 시 필요한 환경변수가 있다면 여기에 추가 가능합니다.
        # env:
        #   NEXT_PUBLIC_API_URL: ${{ secrets.API_URL }}

      - name: 🐳 Docker Build Check
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: false # CI는 검사만 하므로 푸시는 하지 않음!
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-backend:
    name: ⚙️ CI - Backend
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true' && needs.detect-changes.outputs.backend_matrix != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.backend_matrix) }}
    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with: { version: 10.28.1 }

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with: { node-version: "22", cache: "pnpm" }

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build Shared Packages
        run: pnpm --filter "./packages/*" build

      - name: 🧹 Run Lint
        run: pnpm --filter @neticket/${{ matrix.service }} lint

      - name: 🧪 Run Unit Tests
        run: pnpm --filter @neticket/${{ matrix.service }} test

      - name: 🐳 Docker Build Check
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service == 'queue' && 'queue/Dockerfile' || format('backend/{0}/Dockerfile', matrix.service) }}
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ci-summary:
    name: 📊 CI Result Summary
    needs: [detect-changes, ci-frontend, ci-backend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: 🏁 Final Status Check
        run: |
          F_ST="${{ needs.ci-frontend.result }}"
          B_ST="${{ needs.ci-backend.result }}"
          if [[ "$F_ST" == "failure" || "$B_ST" == "failure" ]]; then
            echo "❌ CI Failed: Please check your code"
            exit 1
          fi
          echo "✅ CI Passed: Deployment ready"
