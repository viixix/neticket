name: CD - Manual Deploy (Optimized)

on:
  workflow_dispatch:
    inputs:
      services:
        description: "배포 대상 선택"
        required: true
        default: "backend"
        type: choice
        options:
          - backend
          - api-server
          - ticket-server
          - queue-backend
          - all
      branch:
        description: "배포할 브랜치"
        required: true
        default: "dev"

jobs:
  # 1단계: 배포 대상 결정 (JSON 매트릭스 생성)
  resolve-targets:
    name: 배포 대상 결정
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_targets: ${{ steps.set-matrix.outputs.has_targets }}
    steps:
      - id: set-matrix
        shell: bash
        run: |
          SERVICES="${{ github.event.inputs.services }}"
          if [ "$SERVICES" = "all" ]; then
            JSON='["api-server", "ticket-server", "queue-backend"]'
          elif [ "$SERVICES" = "backend" ]; then
            JSON='["api-server", "ticket-server"]'
          else
            JSON="[\"$SERVICES\"]"
          fi
          echo "matrix=$JSON" >> "$GITHUB_OUTPUT"
          echo "has_targets=true" >> "$GITHUB_OUTPUT"

  # 2단계: 이미지 빌드 및 푸시 (GHA 캐시 활용)
  build-and-push:
    name: Build & Push - ${{ matrix.service }}
    needs: resolve-targets
    if: needs.resolve-targets.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.resolve-targets.outputs.matrix) }}
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Docker Buildx 설치
        uses: docker/setup-buildx-action@v3

      - name: NCP 레지스트리 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NCP_REGISTRY_URL }}
          username: ${{ secrets.NCP_REGISTRY_USERNAME }}
          password: ${{ secrets.NCP_REGISTRY_PASSWORD }}

      - name: ${{ matrix.service }} 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.service == 'queue-backend' && 'queue-backend/Dockerfile' || format('backend/{0}/Dockerfile', matrix.service) }}
          push: true
          tags: ${{ secrets.NCP_REGISTRY_URL }}/beastcamp-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3a: 백엔드 호스트(api + ticket) — 동일 호스트·동일 compose이므로 직렬
  deploy-backend:
    name: Deploy (backend) - ${{ matrix.service }}
    needs: [resolve-targets, build-and-push]
    if: needs.resolve-targets.outputs.has_targets == 'true' && (contains(needs.resolve-targets.outputs.matrix, 'api-server') || contains(needs.resolve-targets.outputs.matrix, 'ticket-server'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - service: api-server
            host_secret: BACKEND_SERVER_HOST
            user_secret: BACKEND_SERVER_USER
            pass_secret: BACKEND_SERVER_PASSWORD
          - service: ticket-server
            host_secret: BACKEND_SERVER_HOST
            user_secret: BACKEND_SERVER_USER
            pass_secret: BACKEND_SERVER_PASSWORD
    steps:
      - name: 배포 실행
        if: contains(fromJson(needs.resolve-targets.outputs.matrix), matrix.service)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets[matrix.user_secret] }}
          password: ${{ secrets[matrix.pass_secret] }}
          envs: NCP_REGISTRY_URL,NCP_REGISTRY_USERNAME,NCP_REGISTRY_PASSWORD,IMAGE_TAG,SERVICE_NAME,TARGET_BRANCH,LOKI_URL
          script: |
            cd /app/web10-beastcamp

            # 1. 최신 코드 동기화
            git fetch origin $TARGET_BRANCH
            git reset --hard origin/$TARGET_BRANCH

            # 2. 서비스 위치로 이동
            [ "$SERVICE_NAME" == "queue-backend" ] && cd queue-backend || cd backend

            # 3. 환경 변수 설정 (LOKI_URL 주입)
            if [ ! -f .env ]; then touch .env; fi
            sed -i '/^LOKI_URL=/d' .env
            echo "LOKI_URL=$LOKI_URL" >> .env

            # 4. NCP 레지스트리 로그인
            echo "$NCP_REGISTRY_PASSWORD" | docker login "$NCP_REGISTRY_URL" -u "$NCP_REGISTRY_USERNAME" --password-stdin

            # 5. 배포 (Clean Export 문법 반영 및 --wait 적용)
            export IMAGE_TAG NCP_REGISTRY_URL SERVICE_NAME LOKI_URL

            echo "🚀 $SERVICE_NAME 배포 중 (Healthcheck 대기)..."
            docker compose pull $SERVICE_NAME promtail cadvisor
            docker compose up -d --wait --no-build $SERVICE_NAME promtail cadvisor

            # 6. 디스크 청소 (24시간 이내 이미지는 보존하여 롤백 대비)
            docker image prune -af --filter "until=24h"
            echo "✅ $SERVICE_NAME 배포 완료"
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE_NAME: ${{ matrix.service }}
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          NCP_REGISTRY_URL: ${{ secrets.NCP_REGISTRY_URL }}
          NCP_REGISTRY_USERNAME: ${{ secrets.NCP_REGISTRY_USERNAME }}
          NCP_REGISTRY_PASSWORD: ${{ secrets.NCP_REGISTRY_PASSWORD }}
          LOKI_URL: ${{ secrets.LOKI_URL }}

  # 3b: 큐 호스트 — 백엔드 deploy-backend와 서로 needs 없음 → all 선택 시 병렬 실행
  deploy-queue:
    name: Deploy (queue) - queue-backend
    needs: [resolve-targets, build-and-push]
    if: needs.resolve-targets.outputs.has_targets == 'true' && contains(needs.resolve-targets.outputs.matrix, 'queue-backend')
    runs-on: ubuntu-latest
    steps:
      - name: 배포 실행
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.QUEUE_SERVER_HOST }}
          username: ${{ secrets.QUEUE_SERVER_USER }}
          password: ${{ secrets.QUEUE_SERVER_PASSWORD }}
          envs: NCP_REGISTRY_URL,NCP_REGISTRY_USERNAME,NCP_REGISTRY_PASSWORD,IMAGE_TAG,SERVICE_NAME,TARGET_BRANCH,LOKI_URL
          script: |
            cd /app/web10-beastcamp

            # 1. 최신 코드 동기화
            git fetch origin $TARGET_BRANCH
            git reset --hard origin/$TARGET_BRANCH

            # 2. 서비스 위치로 이동
            [ "$SERVICE_NAME" == "queue-backend" ] && cd queue-backend || cd backend

            # 3. 환경 변수 설정 (LOKI_URL 주입)
            if [ ! -f .env ]; then touch .env; fi
            sed -i '/^LOKI_URL=/d' .env
            echo "LOKI_URL=$LOKI_URL" >> .env

            # 4. NCP 레지스트리 로그인
            echo "$NCP_REGISTRY_PASSWORD" | docker login "$NCP_REGISTRY_URL" -u "$NCP_REGISTRY_USERNAME" --password-stdin

            # 5. 배포 (Clean Export 문법 반영 및 --wait 적용)
            export IMAGE_TAG NCP_REGISTRY_URL SERVICE_NAME LOKI_URL

            echo "🚀 $SERVICE_NAME 배포 중 (Healthcheck 대기)..."
            docker compose pull $SERVICE_NAME promtail cadvisor
            docker compose up -d --wait --no-build $SERVICE_NAME promtail cadvisor

            # 6. 디스크 청소 (24시간 이내 이미지는 보존하여 롤백 대비)
            docker image prune -af --filter "until=24h"
            echo "✅ $SERVICE_NAME 배포 완료"
        env:
          IMAGE_TAG: ${{ github.sha }}
          SERVICE_NAME: queue-backend
          TARGET_BRANCH: ${{ github.event.inputs.branch }}
          NCP_REGISTRY_URL: ${{ secrets.NCP_REGISTRY_URL }}
          NCP_REGISTRY_USERNAME: ${{ secrets.NCP_REGISTRY_USERNAME }}
          NCP_REGISTRY_PASSWORD: ${{ secrets.NCP_REGISTRY_PASSWORD }}
          LOKI_URL: ${{ secrets.LOKI_URL }}

  # 4단계: 결과 요약
  deployment-summary:
    name: Deployment Summary
    needs: [resolve-targets, deploy-backend, deploy-queue]
    if: always() && needs.resolve-targets.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: 결과 출력
        run: |
          echo "=== 배포 요약 ==="
          echo "대상: ${{ needs.resolve-targets.outputs.matrix }}"
          echo "결과: 모든 작업이 완료되었습니다."
